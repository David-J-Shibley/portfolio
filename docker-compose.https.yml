# HTTPS in Docker: Caddy reverse proxy + your existing Node image.
#
# Usage (production):
#   export CADDY_DOMAIN=portfolio.shibleyrecords.com
#   docker compose -f docker-compose.https.yml up -d --build
#
# DNS A/AAAA for CADDY_DOMAIN must point at this host. Open ports 80 and 443 in the firewall/security group.
#
# Local HTTPS (self-signed for localhost):
#   CADDY_DOMAIN=localhost docker compose -f docker-compose.https.yml up -d --build
#   Visit https://localhost

services:
  web:
    build: .
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      TRUST_PROXY: "1"
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
