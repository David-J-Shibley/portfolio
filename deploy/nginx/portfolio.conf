# Start here: HTTP only. After this works, run:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# Certbot will add TLS (443) and usually redirect HTTP → HTTPS.
#
# Copy to /etc/nginx/sites-available/portfolio (or conf.d), replace YOUR_DOMAIN,
# then: sudo nginx -t && sudo systemctl reload nginx

upstream portfolio_node {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://portfolio_node;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
